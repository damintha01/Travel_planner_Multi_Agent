<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TravelBuddy AI</title>

    <link rel="stylesheet" href="/static/style.css?v=3">
</head>

<body>

    <div class="page-bg">
        <div class="gradient-circle circle-1"></div>
        <div class="gradient-circle circle-2"></div>
        <div class="gradient-circle circle-3"></div>
    </div>

    <main class="app-container">

        <section class="hero-section">
            <div class="hero-copy">
                <div class="badge">
                    ✦ TravelBuddy AI — A multi-agent travel studio
                </div>

                

                

        </section>

        <section class="planner-card">

            <div class="card-header">
                <div>
                    <h2>Start planning your next escape</h2>
                    
                </div>

                <div class="status-pill">
                    <span class="status-dot"></span>
                    Online
                </div>
            </div>

            <div class="input-area">
                <textarea
                    id="userInput"
                    placeholder="Plan a complete 7 day Japan trip including flights, hotels and sightseeing under Rs 2,00,000..."
                ></textarea>

                <button id="sendBtn" onclick="sendMessage()">
                    <span id="btnText">Generate Plan</span>
                    <span id="btnLoader" class="loader hidden"></span>
                </button>
            </div>

            <div class="quick-prompts">
                <button onclick="setPrompt('Plan a complete 7 day Japan trip from Sri Lanka including flights, hotels and sightseeing under Rs 2,00,000.')">
                    Japan Trip
                </button>

                <button onclick="setPrompt('Plan a 5 day Dubai trip from Sri Lanka with flights, hotels and sightseeing. Show all costs in Rs.')">
                    Dubai Trip
                </button>

                <button onclick="setPrompt('Plan a 7 day Thailand trip from Sri Lanka with budget hotels and sightseeing. Show all costs in Rs.')">
                    Thailand Trip
                </button>

                <button onclick="setPrompt('Give me all country flight info and show every price in Rs.')">
                    Global Flights
                </button>
            </div>

        </section>

        <section id="resultSection" class="result-section hidden">

            <div class="result-header">
                <div>
                    <h2>Your AI Travel Plan</h2>
                    <p id="threadInfo">Thread ID: -</p>
                </div>

                <div class="result-actions">
                    <span class="currency-pill">All costs shown in Rs</span>

                    <button class="copy-btn" onclick="copyResult()">
                        Copy
                    </button>

                    <button class="download-btn" onclick="downloadPDF()">
                        Download PDF
                    </button>
                </div>
            </div>

            <div id="pdfContent" class="pdf-content">
                <h1 class="pdf-title">AI Travel Plan</h1>
                <div id="resultBox" class="result-box"></div>
            </div>

        </section>

        <section id="errorBox" class="error-box hidden"></section>

    </main>

    <footer>
        VoyageVista AI is built with FastAPI, LangGraph, Groq, PostgreSQL, Tavily and AviationStack
    </footer>

    <!-- Markdown Renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- PDF Download Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Your Custom JS -->
    <script src="/static/script.js"></script>

</body>
</html>
